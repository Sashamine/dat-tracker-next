name: 10d Confidence Scoring

on:
  workflow_dispatch:
    inputs:
      entity_id:
        description: 'Optional entity filter (e.g. MSTR)'
        required: false
        type: string
      limit:
        description: 'Max datapoints to score'
        required: false
        default: '200'
        type: string
      dry_run:
        description: 'If true, do not write to D1'
        required: false
        default: 'true'
        type: string
      rescore:
        description: 'If true, re-score already-scored datapoints (v1.1 migration)'
        required: false
        default: 'false'
        type: string

  schedule:
    - cron: '0 6 * * *'

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Score candidate datapoints
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

          ENTITY_ID: ${{ inputs.entity_id }}
          LIMIT: ${{ inputs.limit || '500' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          RESCORE: ${{ inputs.rescore || 'false' }}
          CODE_SHA: ${{ github.sha }}

        run: npx tsx scripts/score-candidate-datapoints.ts
