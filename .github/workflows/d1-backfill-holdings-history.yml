name: D1 Backfill holdings-history.ts

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers, or ALL for all"
        required: false
        default: "ALL"
      dry_run:
        description: "Dry run (no writes)"
        required: false
        default: "true"
      metrics:
        description: "Comma-separated metrics, or ALL"
        required: false
        default: "ALL"
      limit:
        description: "Max snapshots to process"
        required: false
        default: "999999"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Backfill holdings-history.ts to D1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx tsx scripts/d1-backfill-holdings-history.ts \
            --tickers="${{ github.event.inputs.tickers }}" \
            --dry-run="${{ github.event.inputs.dry_run }}" \
            --metrics="${{ github.event.inputs.metrics }}" \
            --limit="${{ github.event.inputs.limit }}"
