name: state-verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  state-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run unit test (HKEX shares gate)
        run: npm run -s test:run src/lib/__tests__/llm-extract-artifacts-gates.test.ts

      - name: Build compiled verifier
        run: npm run -s state:verify:build

      - name: Regenerate states
        run: npm run -s state:gen:all

      - name: Verify states
        run: node dist-scripts/state/verify-company-states.js --runId ci

      - name: Ensure no hard failures
        run: |
          node -e "const j=require('./infra/latest-verified.json'); if ((j.failCount||0) !== 0) { console.error('failCount', j.failCount); process.exit(1);} console.log('ok failCount=0')"

      - name: D1 SEC receipt invariant (10c guardrail)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SEC_MISSING_SOURCE_URL_BASELINE: "9"
          SEC_MISSING_ACCESSION_BASELINE: "9"
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" || -z "${CLOUDFLARE_D1_DATABASE_ID:-}" || -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "SEC_RECEIPT_INVARIANT skipped (missing D1 secrets)"
            exit 0
          fi

          npx tsx scripts/cloudflare/d1-artifacts-summary.ts | tee /tmp/d1-artifacts-summary.json

          node - <<'NODE'
          const fs = require('fs');
          const txt = fs.readFileSync('/tmp/d1-artifacts-summary.json','utf8');
          const start = txt.indexOf('{');
          const end = txt.lastIndexOf('}');
          if (start === -1 || end === -1 || end <= start) {
            console.error('Could not find JSON object in summary output');
            process.exit(1);
          }
          const data = JSON.parse(txt.slice(start, end + 1));
          const receipts = data.secFilingReceipts || {};
          const current = receipts.current || {};
          const regression = receipts.regression || {};
          const missingSourceUrl = Number(current.missingSourceUrl || 0);
          const missingAccession = Number(current.missingAccession || 0);
          const sourceUrlRegression = Boolean(regression.sourceUrl);
          const accessionRegression = Boolean(regression.accession);

          console.log('SEC_RECEIPT_INVARIANT', {
            baseline: receipts.baseline || {},
            current: { missingSourceUrl, missingAccession },
            regression: { sourceUrlRegression, accessionRegression },
          });

          if (sourceUrlRegression || accessionRegression) {
            console.error('INVARIANT FAILED: sec_filing receipt counts regressed above baseline');
            process.exit(2);
          }
          NODE

      # Prefer latest-verified policy for hard requirements; don't fail the workflow on
      # 'verification-gaps.json' mismatches since it's derived/reporting and can be stale.
      - name: Warn on verification gaps (non-blocking)
        run: |
          node -e "const j=require('./infra/verification-gaps.json'); const keys=Object.keys(j.gaps||{}); if(keys.length){ console.warn('gaps', keys);} else { console.log('ok gaps=0'); }"
