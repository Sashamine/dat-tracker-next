name: state-verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  state-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run unit test (HKEX shares gate)
        run: npm run -s test:run src/lib/__tests__/llm-extract-artifacts-gates.test.ts

      - name: Build compiled verifier
        run: npm run -s state:verify:build

      - name: Regenerate states
        run: npm run -s state:gen:all

      - name: Verify states
        run: node dist-scripts/state/verify-company-states.js --runId ci

      - name: Ensure no hard failures
        run: |
          node -e "const j=require('./infra/latest-verified.json'); if ((j.failCount||0) !== 0) { console.error('failCount', j.failCount); process.exit(1);} console.log('ok failCount=0')"

      - name: D1 SEC receipt invariant (10c guardrail)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" || -z "${CLOUDFLARE_D1_DATABASE_ID:-}" || -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "SEC_RECEIPT_INVARIANT skipped (missing D1 secrets)"
            exit 0
          fi

          npx tsx scripts/cloudflare/sec-receipt-invariant.ts --check --baseline-file infra/sec-receipt-baseline.json

      - name: Ratchet SEC receipt baseline (master push only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" || -z "${CLOUDFLARE_D1_DATABASE_ID:-}" || -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "SEC_RECEIPT_BASELINE_RATCHET skipped (missing D1 secrets)"
            exit 0
          fi

          npx tsx scripts/cloudflare/sec-receipt-invariant.ts --ratchet --baseline-file infra/sec-receipt-baseline.json

      - name: Create PR if baseline ratcheted
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(invariants): ratchet SEC receipt baseline"
          title: "chore(invariants): ratchet SEC receipt baseline"
          body: |
            Automated SEC receipt baseline ratchet from state-verify.

            Source: scripts/cloudflare/sec-receipt-invariant.ts --ratchet
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch: ops/sec-receipt-baseline-ratchet
          delete-branch: true
          add-paths: |
            infra/sec-receipt-baseline.json

      # Prefer latest-verified policy for hard requirements; don't fail the workflow on
      # 'verification-gaps.json' mismatches since it's derived/reporting and can be stale.
      - name: Warn on verification gaps (non-blocking)
        run: |
          node -e "const j=require('./infra/verification-gaps.json'); const keys=Object.keys(j.gaps||{}); if(keys.length){ console.warn('gaps', keys);} else { console.log('ok gaps=0'); }"
