name: adoption-weekly-snapshot

on:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday at 07:00 UTC

  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Compute UTC date
        run: echo "DATE_UTC=$(date -u +%F)" >> "$GITHUB_ENV"

      - name: Generate weekly adoption snapshot
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: bash scripts/ops/generate-adoption-weekly.sh

      # Note: master is protected (required checks), so we open a PR rather than pushing directly.
      - name: Create PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ops(adoption): weekly snapshot ${{ env.DATE_UTC }}"
          title: "ops(adoption): weekly snapshot ${{ env.DATE_UTC }}"
          body: |
            Automated weekly adoption snapshot generated by GitHub Actions.

            **Date:** ${{ env.DATE_UTC }}
            **Source:** /api/admin/adoption-signals?window=7d
            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch: ops/adoption-weekly
          delete-branch: true
          add-paths: |
            ops/adoption/
