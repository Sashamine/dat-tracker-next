name: verify citation coverage

on:
  pull_request:
    paths:
      - 'src/lib/d1/**'
      - 'src/lib/sec/**'
      - 'src/lib/utils/citation.ts'
      - 'src/app/api/cron/**'
      - 'scripts/d1-*.ts'
      - 'scripts/ci-verify-citations.ts'
  push:
    branches: [main]
    paths:
      - 'src/lib/d1/**'
      - 'src/lib/sec/**'
      - 'src/lib/utils/citation.ts'
      - 'src/app/api/cron/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify citation coverage (all-time)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx tsx scripts/ci-verify-citations.ts --threshold=100

      - name: Verify citation coverage (current)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx tsx scripts/ci-verify-citations.ts --current-only --threshold=100

      - name: Comment on PR if failed
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            let output;
            try {
              output = execSync('npx tsx scripts/ci-verify-citations.ts --threshold=100 2>&1', {
                encoding: 'utf-8',
                env: {
                  ...process.env,
                  CLOUDFLARE_ACCOUNT_ID: '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}',
                  CLOUDFLARE_D1_DATABASE_ID: '${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}',
                  CLOUDFLARE_API_TOKEN: '${{ secrets.CLOUDFLARE_API_TOKEN }}',
                },
              });
            } catch (e) {
              output = e.stdout || '';
            }

            const body = [
              '## Citation Coverage Gate',
              '',
              'This PR touches data pipeline code. Citation coverage check **failed**.',
              '',
              '```',
              output.trim(),
              '```',
              '',
              'Every new datapoint must arrive with `citation_quote` or `xbrl_concept`.',
              'See `src/lib/utils/citation.ts` for citation generation helpers.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
